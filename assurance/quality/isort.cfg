# ╭────────────────────────────────────────────────────────────────────────────╮
# │ ISORT — Canonical Import Organization                                      │
# ╰────────────────────────────────────────────────────────────────────────────╯
[tool.isort]
profile = black
line_length = 88
multi_line_output = 3

# Trailing commas and parentheses for clarity and consistency
include_trailing_comma = true
use_parentheses = true

# Advanced import control
combine_as_imports = false
force_grid_wrap = 0
ensure_newline_before_comments = true

# Import section hierarchy (matches Clean Architecture layering)
sections = FUTURE,STDLIB,THIRDPARTY,FIRSTPARTY,LOCALFOLDER
known_first_party = quantum
default_section = THIRDPARTY
lines_between_types = 1
case_sensitive = true
atomic = true
