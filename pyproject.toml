# ╭─────────────────────────────────────────────────────────────────────────────╮
# │ Project Metadata                                                            │
# ╰─────────────────────────────────────────────────────────────────────────────╯
[project]
name = "quantum"
version = "0.1.0"
description = ""
authors = [
    { name = "Matine NASSIRPOUR", email = "matine@nassirpour.org" }
]
license = "Proprietary"
requires-python = ">=3.11,<3.12"
readme = "README.md"
packages = [{ include = "quantum", from = "src" }]


# ╭─────────────────────────────────────────────────────────────────────────────╮
# │ Dependencies                                                                │
# ╰─────────────────────────────────────────────────────────────────────────────╯
[tool.poetry.dependencies]
pydantic = "^2.11.9"
pydantic-settings = "^2.11.0"
opentelemetry-sdk = "^1.37.0"
opentelemetry-exporter-otlp = "^1.37.0"
prometheus-client = "^0.23.1"
streamlit = "^1.50.0"
python-dotenv = "^1.1.1"
metatrader5 = "^5.0.5328"


# ╭─────────────────────────────────────────────────────────────────────────────╮
# │ Development Dependencies                                                    │
# ╰─────────────────────────────────────────────────────────────────────────────╯
[tool.poetry.group.dev.dependencies]
pre-commit = "^4.3.0"
detect-secrets = "^1.5.0"
pytest = "^8.4.2"
pytest-cov = "^7.0.0"
mypy = "^1.18.2"
ruff = "^0.13.2"
black = "^25.9.0"
bandit = "^1.8.6"
pip-audit = "^2.9.0"
import-linter = "^2.5"


# ╭─────────────────────────────────────────────────────────────────────────────╮
# │ Build System                                                                │
# ╰─────────────────────────────────────────────────────────────────────────────╯
[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"


# ╭─────────────────────────────────────────────────────────────────────────────╮
# │ Code Style Tools                                                            │
# ╰─────────────────────────────────────────────────────────────────────────────╯
[tool.black]
line-length = 88
target-version = ["py311"]
skip-string-normalization = false
skip-magic-trailing-comma = false

[tool.isort]
profile = "black"
line_length = 88
combine_as_imports = false
include_trailing_comma = true
multi_line_output = 3
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
known_first_party = ["quantum"]


# ╭─────────────────────────────────────────────────────────────────────────────╮
# │ Testing Configuration (pytest)                                              │
# ╰─────────────────────────────────────────────────────────────────────────────╯
[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -q --strict-markers --tb=short --cov=src/quantum --cov-report=term-missing"
markers = [
    "integration: mark tests that perform multi-layer or system integration checks",
    "unit: mark fast, isolated unit tests",
    "slow: mark slow tests that may take longer to execute"
]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning"
]
log_cli = true
log_cli_level = "INFO"
log_cli_format = "%(asctime)s [%(levelname)s] %(message)s"
log_cli_date_format = "%H:%M:%S"


# ╭─────────────────────────────────────────────────────────────────────────────╮
# │ Test Coverage (coverage.py)                                                 │
# ╰─────────────────────────────────────────────────────────────────────────────╯
[tool.coverage.run]
branch = true
source = ["src/quantum"]
omit = [
    "*/__init__.py",
    "*/tests/*",
]

[tool.coverage.report]
show_missing = true
skip_covered = true
precision = 2
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
]

[tool.coverage.html]
directory = "htmlcov"
title = "Quantum Coverage Report"

[tool.coverage.xml]
output = "coverage.xml"
