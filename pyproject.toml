# ╭────────────────────────────────────────────────────────────────────────────╮
# │ Project Metadata                                                           │
# ╰────────────────────────────────────────────────────────────────────────────╯
[project]
name = "quantum"
version = "0.1.0"
description = ""
authors = [
    { name = "Matine NASSIRPOUR", email = "matine@nassirpour.org" }
]
license = "Proprietary"
requires-python = ">=3.11,<3.12"
readme = "README.md"
packages = [{ include = "quantum", from = "src" }]

# ------------------------------------------------------------------------------
# Python runtime policy
# ------------------------------------------------------------------------------
[tool.poetry.dependencies]
pydantic = "^2.11.9"
pydantic-settings = "^2.11.0"
opentelemetry-sdk = "^1.37.0"
opentelemetry-exporter-otlp = "^1.37.0"
prometheus-client = "^0.23.1"
streamlit = "^1.50.0"
python-dotenv = "^1.1.1"
metatrader5 = "^5.0.5328"

# ------------------------------------------------------------------------------
# Dev toolchain (QA / security / lint / typing / tests)
# ------------------------------------------------------------------------------
[tool.poetry.group.dev.dependencies]
pre-commit = "^4.3.0"
detect-secrets = "^1.5.0"
pytest = "^8.4.2"
pytest-cov = "^7.0.0"
mypy = "^1.18.2"
ruff = "^0.13.2"
black = "^25.9.0"
bandit = "^1.8.6"
pip-audit = "^2.9.0"
import-linter = "^2.5"


# ╭────────────────────────────────────────────────────────────────────────────╮
# │ Build System                                                               │
# ╰────────────────────────────────────────────────────────────────────────────╯
[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"


# ╭────────────────────────────────────────────────────────────────────────────╮
# │ Code Style & Lint                                                          │
# ╰────────────────────────────────────────────────────────────────────────────╯
[tool.black]
line-length = 88
target-version = ["py311"]
skip-string-normalization = false
skip-magic-trailing-comma = false
preview = true

[tool.isort]
profile = "black"
line_length = 88
multi_line_output = 3
include_trailing_comma = true
use_parentheses = true
combine_as_imports = false
force_grid_wrap = 0
ensure_newline_before_comments = true
sections = ["FUTURE", "STDLIB", "THIRDPARTY", "FIRSTPARTY", "LOCALFOLDER"]
known_first_party = ["quantum"]
default_section = "THIRDPARTY"
lines_between_types = 1
case_sensitive = true
atomic = true

[tool.ruff]
# ⚙️ Analyse statique complète (Flake8 + isort + pycodestyle + bugbear + pydocstyle)
#select = ["E", "F", "W", "B", "UP", "I", "C90"]
select = ["F", "W", "UP", "I", "C90"]
ignore = ["I001", "I002"]  # Laisse isort gérer les imports
fix = true
line-length = 88
target-version = "py311"
respect-gitignore = true
format.preview = true

[tool.ruff.lint.mccabe]
max-complexity = 8

[tool.ruff.lint.per-file-ignores]
# Disables rule C901 (complexity) for everything that is not part of the core architecture
"tests/**/*.py" = ["C901"]
"scripts/**/*.py" = ["C901"]
"runtime/**/*.py" = ["C901"]
"apps/**/*.py" = ["C901"]
"docs/**/*.py" = ["C901"]

# ╭────────────────────────────────────────────────────────────────────────────╮
# │ Typing (mypy)                                                              │
# ╰────────────────────────────────────────────────────────────────────────────╯
[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_configs = true
warn_unused_ignores = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
disallow_untyped_calls = true
disallow_untyped_decorators = true
no_implicit_optional = true
show_error_codes = true
ignore_missing_imports = true
pretty = true


# ╭────────────────────────────────────────────────────────────────────────────╮
# │ Testing Configuration (pytest)                                             │
# ╰────────────────────────────────────────────────────────────────────────────╯
[tool.pytest.ini_options]
testpaths = [
    "tests",
    "src/quantum/application",
    "src/quantum/domain",
    "src/quantum/infrastructure",
    "src/quantum/interfaces",
]

python_files = ["test_*.py"]
python_classes = ["Test*", "*Tests"]
python_functions = ["test_*"]

addopts = """
-ra -q --strict-markers --tb=short
--cov=src/quantum
--cov-report=term-missing
"""

markers = [
    "unit: mark fast, isolated unit tests",
    "integration: mark tests that perform multi-layer or adapter-level checks",
    "e2e: mark end-to-end tests crossing multiple runtime boundaries",
    "slow: mark slow tests that may take longer to execute",
]

filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

log_cli = true
log_cli_level = "INFO"
log_cli_format = "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
log_cli_date_format = "%Y-%m-%d %H:%M:%S"


# ╭────────────────────────────────────────────────────────────────────────────╮
# │ Test Coverage (coverage.py)                                                │
# ╰────────────────────────────────────────────────────────────────────────────╯
[tool.coverage.run]
branch = true
source = ["src/quantum"]
omit = [
    "*/__init__.py",
    "*/tests/*",
]

[tool.coverage.report]
show_missing = true
skip_covered = true
precision = 2
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
    "pass",
]

[tool.coverage.html]
directory = "htmlcov"
title = "Quantum Coverage Report"

[tool.coverage.xml]
output = "coverage.xml"


# ╭────────────────────────────────────────────────────────────────────────────╮
# │ Security (Bandit)                                                          │
# ╰────────────────────────────────────────────────────────────────────────────╯
[tool.bandit]
targets = ["src/quantum"]
skips = ["B101"]  # allows the use of 'assert' in tests if necessary
severity = "LOW"
confidence = "HIGH"
